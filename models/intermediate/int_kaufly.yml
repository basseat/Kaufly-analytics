version: 2

models:
  - name: int_orders_enriched
    description: Orders joined with customer country, delivery metrics, item counts, and membership status at time of order
    columns:
      - name: order_id
        tests:
          - unique
          - not_null

  - name: int_order_items_enriched
    description: Order line items joined with product details and order context
    columns:
      - name: order_item_id
        tests:
          - unique
          - not_null

  - name: int_customer_order_summary
    description: Customer-level lifetime aggregations including orders, revenue, returns, and segmentation
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: customer_segment
        tests:
          - accepted_values:
              values: ["never_ordered", "one_time", "repeat", "loyal"]

  - name: int_session_funnel
    description: Session-level conversion funnel with stage progression and duration
    columns:
      - name: session_id
        tests:
          - unique
          - not_null
      - name: furthest_stage
        tests:
          - accepted_values:
              values: ["bounce", "page_view", "product_view", "add_to_cart", "checkout_start", "purchase"]
